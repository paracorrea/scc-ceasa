<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
    <title>Nova Prestação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">

<h2>Nova Prestação de Contas</h2>

<form method="post" th:action="@{/prestacoes}">

    <div class="row">

        <div class="col-md-6 mb-3">
            <label class="form-label">Convênio</label>

            <select name="convenioId" class="form-control" required>

                <option value="">Selecione...</option>

                <option th:each="c : ${convenios}"
                        th:value="${c.id}"
                        th:text="${c.numero}">
                </option>

            </select>

        </div>


        <div class="col-md-4 mb-3">
            <label class="form-label">Mês da Prestação</label>

            <input
                    type="month"
                    class="form-control"
                    name="mesReferencia"
                    required>

        </div>

    </div>

    <div class="mt-3">

        <button class="btn btn-primary">
            Criar Prestação
        </button>

        <a class="btn btn-secondary"
           th:href="@{/prestacoes}">
            Cancelar
        </a>

    </div>

</form>

</body>
</html>
