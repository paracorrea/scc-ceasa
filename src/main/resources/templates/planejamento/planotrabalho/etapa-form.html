<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Etapa da Meta',
        pageTitle='Etapa da Meta',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pb-0">
                    <h4 class="mb-1"
                        th:text="${etapa.id == null ? 'Nova Etapa' : 'Editar Etapa'}">
                        Etapa
                    </h4>
                    <p class="text-muted mb-0">
                        Meta:
                        <strong th:text="${meta.descricao}">Descrição da meta</strong>
                    </p>
                </div>

                <div class="card-body">
                    <form method="post"
                          th:action="@{'/planejamento/metas/' + ${meta.id} + '/etapas'}"
                          th:object="${etapa}">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{descricao}"
                                      maxlength="1000"
                                      required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Despesa</label>
                                <select class="form-select" th:field="*{despesa.id}">
                                    <option value="">Selecione...</option>
                                    <option th:each="d : ${despesas}"
                                            th:value="${d.id}"
                                            th:text="${d.nome}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Item de Despesa</label>
                                <select class="form-select" th:field="*{itemDespesa.id}">
                                    <option value="">Selecione...</option>
                                    <option th:each="i : ${itensDespesa}"
                                            th:value="${i.id}"
                                            th:text="${i.nome}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Duração</label>
                                <input class="form-control"
                                       type="text"
                                       th:field="*{duracao}"
                                       maxlength="120">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Quantidade</label>
                                <input class="form-control"
                                       type="number"
                                       step="0.01"
                                       th:field="*{quantidade}">
                            </div>

                            <div class="col-md-4 mb-4">
                                <label class="form-label">Valor</label>
                                <input class="form-control"
                                       type="number"
                                       step="0.01"
                                       th:field="*{valor}"
                                       required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <a class="btn btn-outline-secondary"
                               th:href="@{'/planejamento/metas/' + ${meta.id} + '/etapas'}">
                                Voltar
                            </a>

                            <div class="d-flex gap-2">
                                <button type="reset" class="btn btn-light">Limpar</button>
                                <button type="submit" class="btn btn-primary">Salvar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
