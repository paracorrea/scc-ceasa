<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Etapas da Meta',
        pageTitle='Etapas da Meta',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1">Etapas da Meta</h4>
            <p class="text-muted mb-0">
                Meta:
                <strong th:text="${meta.descricao}">Descrição da meta</strong>
            </p>
        </div>

        <a class="btn btn-primary"
           th:href="@{'/planejamento/metas/' + ${meta.id} + '/etapas/novo'}">
            Nova Etapa
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Descrição</th>
                        <th>Despesa</th>
                        <th>Item de Despesa</th>
                        <th>Duração</th>
                        <th>Quantidade</th>
                        <th>Valor</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e : ${etapas}">
                        <td th:text="${e.descricao}">Descrição</td>
                        <td th:text="${e.despesa != null ? e.despesa.nome : ''}">Despesa</td>
                        <td th:text="${e.itemDespesa != null ? e.itemDespesa.nome : ''}">Item</td>
                        <td th:text="${e.duracao}">Duração</td>
                        <td th:text="${e.quantidade}">0</td>
                        <td th:text="${#numbers.formatDecimal(e.valor, 1, 'POINT', 2, 'COMMA')}">0,00</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{'/planejamento/metas/' + ${meta.id} + '/etapas/' + ${e.id} + '/editar'}">
                                Editar
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(etapas)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            Nenhuma etapa cadastrada para esta meta.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-outline-secondary"
           th:href="@{'/planejamento/planos-trabalho/' + ${meta.planoTrabalho.id} + '/metas'}">
            Voltar para Metas
        </a>
    </div>
</div>

</html>
