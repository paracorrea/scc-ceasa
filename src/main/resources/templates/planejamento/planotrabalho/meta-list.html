<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Metas do Plano',
        pageTitle='Metas do Plano',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1">Metas do Plano de Trabalho</h4>
            <p class="text-muted mb-0">
                Plano:
                <strong th:text="${plano.descricao}">Descrição do plano</strong>
            </p>
        </div>

        <a class="btn btn-primary"
           th:href="@{'/planejamento/planos-trabalho/' + ${plano.id} + '/metas/novo'}">
            Nova Meta
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Descrição da Meta</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="m : ${metas}">
                        <td th:text="${m.descricao}">Descrição</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{'/planejamento/planos-trabalho/' + ${plano.id} + '/metas/' + ${m.id} + '/editar'}">
                                Editar
                            </a>

                            <a class="btn btn-sm btn-outline-dark"
                               th:href="@{'/planejamento/metas/' + ${m.id} + '/etapas'}">
                                Etapas
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(metas)}">
                        <td colspan="2" class="text-center py-5 text-muted">
                            Nenhuma meta cadastrada para este plano.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-outline-secondary"
           th:href="@{'/planejamento/planos-trabalho/' + ${plano.id} + '/editar'}">
            Voltar para o Plano
        </a>
    </div>
</div>

</html>
