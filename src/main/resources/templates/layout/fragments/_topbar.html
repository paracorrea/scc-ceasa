<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topbar(pageTitle)" class="scc-topbar">
    <div class="d-flex align-items-center gap-3">
        <button id="sidebarToggle" class="btn btn-sm btn-outline-secondary" type="button">
            ☰
        </button>
        <div>
            <h5 class="mb-0" th:text="${pageTitle} ?: 'SCC'">SCC</h5>
            <small class="text-muted">Sistema de Contas de Convênio</small>
        </div>
    </div>

    <div class="scc-topbar-actions">
        <div class="scc-search-box">
            <input type="text" class="form-control form-control-sm" placeholder="Buscar...">
        </div>

        <button class="btn btn-light btn-sm position-relative" type="button" title="Mensagens">
            🔔
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                3
            </span>
        </button>

  	<div class="dropdown">
    <button class="btn btn-light btn-sm dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown">

        <span th:text="${usuarioLogado}">Usuário</span>
        <span class="text-muted ms-1">
            | <span th:text="${perfilLogado}">Perfil</span>
        </span>

    </button>

    <ul class="dropdown-menu dropdown-menu-end">

        <li>
            <a class="dropdown-item" th:href="@{/perfil}">
                👤 Meu perfil
            </a>
        </li>

        <li>
            <a class="dropdown-item" th:href="@{/preferencias}">
                ⚙️ Preferências
            </a>
        </li>

        <li><hr class="dropdown-divider"></li>

        <li>
          <form th:action="@{/logout}" method="post" style="margin:0;">
  			  <input type="hidden"
          		 th:name="${_csrf.parameterName}"
          		 th:value="${_csrf.token}" />

    			<button type="submit" class="dropdown-item text-danger">
       			 🚪 Sair
    			</button>
		</form>
        </li>

    </ul>
</div>
    </div>
</header>
</body>
</html>
