<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title} ?: 'SCC - CEASA'">SCC - CEASA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="bg-light">
<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container py-4" th:fragment="base(title, pageTitle, content)">
  <div class="mb-3">
    <h3 class="mb-0" th:text="${pageTitle}">Título</h3>
  </div>
  <div th:replace="${content}">Conteúdo</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
