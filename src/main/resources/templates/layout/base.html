<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, pageTitle, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'SCC - Sistema de Contas de Convênio'">SCC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <link th:href="@{/css/layout.css}" rel="stylesheet">
</head>
<body>
<div class="scc-app">
    <div th:replace="~{layout/fragments/_sidebar :: sidebar}"></div>

    <div class="scc-main">
        <div th:replace="~{layout/fragments/_topbar :: topbar(${pageTitle})}"></div>

        <section class="scc-content">
            <div class="scc-content-top">
                <div th:replace="~{layout/fragments/_messages :: messages}"></div>
            </div>

            <div class="scc-content-body">
                <div th:replace="${content}"></div>
            </div>

            <div class="scc-content-bottom">
                <div th:replace="~{layout/fragments/_footer :: footer}"></div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/layout.js}"></script>
</body>
</html>
