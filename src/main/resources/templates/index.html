<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/base :: main-layout(~{::main})}">
<body>
    <main class="p-8">
        <!-- Dashboard Convênio -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Total Anual -->
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-green-100 text-green-600 rounded flex items-center justify-center">
                        <i class="fas fa-file-contract"></i>
                    </div>
                    <p class="text-slate-500 text-sm font-medium">Total do Convênio (Anual)</p>
                </div>
                <h3 class="text-2xl font-bold text-slate-800" 
                    th:text="${'R$ ' + #numbers.formatDecimal(convenio.totalAnual, 1, 'POINT', 2, 'COMMA')}">R$ 1.200.000,00</h3>
                <p class="text-[10px] text-slate-400 mt-1 italic" th:text="${'Vigência: ' + convenio.periodo}">Vigência: Jan - Dez 2024</p>
            </div>

            <!-- Executado -->
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded flex items-center justify-center">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <p class="text-slate-500 text-sm font-medium">Gastos Executados (YTD)</p>
                </div>
                <h3 class="text-2xl font-bold text-slate-800"
                    th:text="${'R$ ' + #numbers.formatDecimal(convenio.executado, 1, 'POINT', 2, 'COMMA')}">R$ 450.000,00</h3>
                <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3">
                    <div class="bg-blue-600 h-1.5 rounded-full" th:style="'width: ' + ${convenio.percentual} + '%'"></div>
                </div>
            </div>

            <!-- Saldo -->
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-8 h-8 bg-orange-100 text-orange-600 rounded flex items-center justify-center">
                        <i class="fas fa-balance-scale"></i>
                    </div>
                    <p class="text-slate-500 text-sm font-medium">Diferença (Saldo)</p>
                </div>
                <h3 class="text-2xl font-bold text-orange-600"
                    th:text="${'R$ ' + #numbers.formatDecimal(convenio.saldo, 1, 'POINT', 2, 'COMMA')}">R$ 750.000,00</h3>
                <p class="text-[10px] text-green-600 mt-1 font-bold">Dentro do planejado</p>
            </div>
        </div>

        <!-- Tabela de Detalhamento -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-slate-800">Detalhamento por Categoria</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest font-bold">
                            <th class="px-6 py-4">Mês</th>
                            <th class="px-6 py-4">Planejado (R$)</th>
                            <th class="px-6 py-4">Executado (R$)</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm font-medium">
                        <tr th:each="item : ${detalhamento}">
                            <td class="px-6 py-4 text-slate-800" th:text="${item.mes}">Janeiro</td>
                            <td class="px-6 py-4 text-slate-500" th:text="${item.planejado}">100.000,00</td>
                            <td class="px-6 py-4 text-slate-700 font-bold" th:text="${item.executado}">92.000,00</td>
                            <td class="px-6 py-4">
                                <span th:class="${item.status == 'Ok' ? 'px-2 py-1 bg-green-100 text-green-700 text-[10px] rounded-full uppercase' : 'px-2 py-1 bg-red-100 text-red-700 text-[10px] rounded-full uppercase'}" 
                                      th:text="${item.status}">Ok</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
