<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Dirigentes da Entidade',
        pageTitle='Dirigentes da Entidade',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1">Dirigentes</h4>
            <p class="text-muted mb-0" th:text="'Entidade: ' + ${entidade.nome}">Entidade</p>
        </div>
        <a class="btn btn-primary" th:href="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/dirigentes/novo'}">
            Novo Dirigente
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Cargo</th>
                        <th>Cidade</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="d : ${dirigentes}">
                        <td th:text="${d.nome}">Nome</td>
                        <td th:text="${d.cpf}">CPF</td>
                        <td th:text="${d.cargo}">Cargo</td>
                        <td th:text="${d.cidade}">Cidade</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/dirigentes/' + ${d.id} + '/editar'}">
                                Editar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(dirigentes)}">
                        <td colspan="5" class="text-center py-5 text-muted">Nenhum dirigente cadastrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-outline-secondary" th:href="@{/cadastros/entidades-conveniadas}">Voltar para Entidades</a>
    </div>
</div>

</html>
