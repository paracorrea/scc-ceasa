<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Contas Bancárias da Entidade',
        pageTitle='Contas Bancárias da Entidade',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1">Contas Bancárias</h4>
            <p class="text-muted mb-0" th:text="'Entidade: ' + ${entidade.nome}">Entidade</p>
        </div>
        <a class="btn btn-primary" th:href="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/contas-bancarias/novo'}">
            Nova Conta
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Banco</th>
                        <th>Agência</th>
                        <th>Número da Conta</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${contas}">
                        <td th:text="${c.banco}">Banco</td>
                        <td th:text="${c.agencia}">Agência</td>
                        <td th:text="${c.numeroConta}">Conta</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-secondary"
                               th:href="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/contas-bancarias/' + ${c.id} + '/editar'}">
                                Editar
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(contas)}">
                        <td colspan="4" class="text-center py-5 text-muted">Nenhuma conta bancária cadastrada.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a class="btn btn-outline-secondary" th:href="@{/cadastros/entidades-conveniadas}">Voltar para Entidades</a>
    </div>
</div>

</html>
