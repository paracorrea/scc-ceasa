<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Conta Bancária da Entidade',
        pageTitle='Conta Bancária da Entidade',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pb-0">
                    <h4 class="mb-1" th:text="${conta.id == null ? 'Nova Conta Bancária' : 'Editar Conta Bancária'}">Conta Bancária</h4>
                    <p class="text-muted mb-0" th:text="'Entidade: ' + ${entidade.nome}">Entidade</p>
                </div>

                <div class="card-body">
                    <form method="post"
                          th:action="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/contas-bancarias'}"
                          th:object="${conta}">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Banco</label>
                            <input class="form-control" type="text" th:field="*{banco}" maxlength="120" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Agência</label>
                                <input class="form-control" type="text" th:field="*{agencia}" maxlength="20" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Número da Conta</label>
                                <input class="form-control" type="text" th:field="*{numeroConta}" maxlength="30" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a class="btn btn-outline-secondary"
                               th:href="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/contas-bancarias'}">Voltar</a>
                            <button class="btn btn-primary" type="submit">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
