<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Dirigente da Entidade',
        pageTitle='Dirigente da Entidade',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pb-0">
                    <h4 class="mb-1" th:text="${dirigente.id == null ? 'Novo Dirigente' : 'Editar Dirigente'}">Dirigente</h4>
                    <p class="text-muted mb-0" th:text="'Entidade: ' + ${entidade.nome}">Entidade</p>
                </div>

                <div class="card-body">
                    <form method="post"
                          th:action="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/dirigentes'}"
                          th:object="${dirigente}">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input class="form-control" type="text" th:field="*{nome}" maxlength="255" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CPF</label>
                                <input class="form-control" type="text" th:field="*{cpf}" maxlength="14" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cargo</label>
                                <input class="form-control" type="text" th:field="*{cargo}" maxlength="120">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Cidade</label>
                            <input class="form-control" type="text" th:field="*{cidade}" maxlength="120">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a class="btn btn-outline-secondary"
                               th:href="@{'/cadastros/entidades-conveniadas/' + ${entidade.id} + '/dirigentes'}">Voltar</a>
                            <button class="btn btn-primary" type="submit">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
