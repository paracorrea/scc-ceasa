<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
        title='Unidade Administrativa',
        pageTitle='Unidade Administrativa',
        content=~{::content}
      )}">

<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-0 pb-0">
                    <h4 class="mb-1"
                        th:text="${unidade.id == null ? 'Nova Unidade Administrativa' : 'Editar Unidade Administrativa'}">
                        Unidade Administrativa
                    </h4>
                    <p class="text-muted mb-0">Preencha os dados abaixo para salvar o cadastro.</p>
                </div>

                <div class="card-body">
                    <form th:action="@{/cadastros/unidades}" method="post" th:object="${unidade}">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label" for="nome">Nome</label>
                            <input id="nome" class="form-control" type="text" th:field="*{nome}" maxlength="150" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="sigla">Sigla</label>
                            <input id="sigla" class="form-control" type="text" th:field="*{sigla}" maxlength="30">
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <a class="btn btn-outline-secondary" th:href="@{/cadastros/unidades}">Voltar</a>

                            <div class="d-flex gap-2">
                                <button type="reset" class="btn btn-light">Limpar</button>
                                <button type="submit" class="btn btn-primary">Salvar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
