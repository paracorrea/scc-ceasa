<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout/base :: base(
      title='Unidade Administrativa',
      pageTitle='Unidade Administrativa',
      content=~{::content}
    )}"></div>

<div th:fragment="content">
  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/cadastros/unidades}" method="post" th:object="${unidade}">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input class="form-control" type="text" th:field="*{nome}" required maxlength="150"/>
        </div>

        <div class="mb-3">
          <label class="form-label">Sigla</label>
          <input class="form-control" type="text" th:field="*{sigla}" maxlength="30"/>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Salvar</button>
          <a class="btn btn-outline-secondary" th:href="@{/cadastros/unidades}">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
